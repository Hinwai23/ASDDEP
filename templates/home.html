<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Booking Home</title>
    <style>
        :root {
            color-scheme: light;
            --bg-start: #eef4ff;
            --bg-end: #f8fbff;
            --panel: rgba(255, 255, 255, 0.9);
            --panel-border: rgba(148, 163, 184, 0.18);
            --text: #162033;
            --muted: #5b6475;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --shadow: 0 24px 60px rgba(37, 99, 235, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.16), transparent 34%),
                radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.14), transparent 30%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
        }

        .container {
            width: min(100%, 760px);
            padding: 48px;
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            padding: 8px 14px;
            margin-bottom: 20px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 16px;
            font-size: clamp(2.2rem, 5vw, 3.6rem);
            line-height: 1.08;
        }

        p {
            max-width: 560px;
            margin: 0 0 32px;
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--muted);
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 26px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            box-shadow: 0 16px 32px rgba(37, 99, 235, 0.24);
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .button:hover {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            box-shadow: 0 20px 36px rgba(37, 99, 235, 0.28);
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }

        .subtext {
            font-size: 0.95rem;
            color: #7a8597;
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
            }

            .container {
                padding: 32px 24px;
                border-radius: 22px;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <span class="eyebrow">Ride Booking</span>
        <h1>Welcome to the Ride Booking Service</h1>
        <p>Book your ride with us and enjoy a seamless experience with a cleaner, faster, and more comfortable booking journey.</p>
        <div class="actions">
            <a href="/book" class="button">Book a Ride</a>
            <span class="subtext">Quick, simple, and ready when you are.</span>
        </div>
    </main>
</body>
</html>
